<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D.O.G - Daisy School Directory & Dismissal System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #214289;
      --primary-hover: #1a356c;
      --accent: #f6b756;
      --accent-light: rgba(246, 183, 86, 0.12);
      --bg: #f0f2f7;
      --surface: #ffffff;
      --border: #e2e5eb;
      --text: #1f2937;
      --text-muted: #6b7280;
      --success: #059669;
      --error: #dc2626;
      --called-color: #f59e0b;
      --dismissed-color: #059669;
      --returned-color: #6b7280;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow-card: 0 2px 5px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-lifted: 0 10px 30px rgba(0,0,0,0.12), 0 3px 8px rgba(0,0,0,0.06);
      --shadow-sheet: 0 -10px 35px rgba(0,0,0,0.18);
      --bottom-nav-h: 80px;
      --header-h: 72px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      -webkit-font-smoothing: antialiased;
    }

    /* ── App Shell ─────────────────────────────── */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────── */
    .app-header {
      background: var(--primary);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: var(--header-h);
      flex-shrink: 0;
      position: relative;
      z-index: 100;
    }

    .app-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--accent);
    }

    .header-logo {
      height: 48px;
      width: auto;
      flex-shrink: 0;
      border-radius: 8px;
    }

    .header-search {
      flex: 1;
      position: relative;
    }

    .header-search input {
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 23px;
      padding: 0 44px 0 18px;
      font-size: 17px;
      font-family: inherit;
      background: rgba(255,255,255,0.15);
      color: white;
      outline: none;
      transition: all 0.2s;
    }

    .header-search input::placeholder { color: rgba(255,255,255,0.5); }
    .header-search input:focus {
      background: rgba(255,255,255,0.95);
      color: var(--text);
      box-shadow: 0 0 0 3px rgba(246,183,86,0.3);
    }
    .header-search input:focus::placeholder { color: var(--text-muted); }

    .search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      color: rgba(255,255,255,0.5);
      font-size: 22px;
      cursor: pointer;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .search-clear.show { display: flex; }
    .header-search input:focus ~ .search-clear { color: var(--text-muted); }

    /* ── Scrollable Content ────────────────────── */
    .content-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 16px calc(var(--bottom-nav-h) + var(--safe-bottom) + 16px);
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .content-area::-webkit-scrollbar { width: 6px; }
    .content-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 6px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Student Cards ─────────────────────────── */
    .student-card {
      background: var(--surface);
      border-radius: var(--radius);
      margin-bottom: 12px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      border-left: 5px solid var(--primary);
      transition: transform 0.15s, box-shadow 0.15s, border-left-width 0.15s;
      animation: cardIn 0.3s ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .student-card:hover {
      box-shadow: var(--shadow-lifted);
      border-left-width: 6px;
    }
    .student-card:active { transform: scale(0.985); }

    .card-row {
      display: flex;
      align-items: center;
      padding: 18px 20px;
      gap: 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .card-row:hover { background: rgba(33,66,137,0.03); }

    .grade-dot {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: white;
      flex-shrink: 0;
      text-transform: uppercase;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .student-card:hover .grade-dot {
      transform: scale(1.08);
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    .card-info { flex: 1; min-width: 0; }

    .card-name {
      font-weight: 600;
      font-size: 20px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      font-size: 15px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .card-meta .dot { opacity: 0.4; }

    .card-chevron {
      font-size: 26px;
      font-weight: 300;
      color: #c5c9d1;
      flex-shrink: 0;
      transition: transform 0.2s, color 0.15s;
      width: 26px;
      text-align: center;
    }

    .card-row:hover .card-chevron { color: var(--primary); }

    .student-card:has(.card-detail.open) .card-chevron {
      transform: rotate(90deg);
      color: var(--text-muted);
    }

    /* ── Expanded Detail ───────────────────────── */
    .card-detail {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.2s ease;
    }

    .card-detail.open { grid-template-rows: 1fr; }

    .card-detail > .card-detail-inner {
      overflow: hidden;
      padding: 0 20px;
      border-top: 0px solid transparent;
      transition: padding 0.2s ease, border-top 0.2s ease;
    }

    .card-detail.open > .card-detail-inner {
      padding: 0 20px 16px;
      border-top: 1px solid var(--border);
    }

    .detail-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 14px;
      align-items: center;
    }

    .info-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 15px;
      color: var(--text);
      transition: all 0.15s;
    }

    .info-chip:hover {
      background: #e2e5f0;
      transform: translateY(-1px);
    }

    .info-chip .label {
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.3px;
    }

    .dismiss-chip {
      background: #fef2f2 !important;
      border: 1.5px solid #fecaca;
      color: var(--error);
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      margin-left: auto;
      padding: 8px 14px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .dismiss-chip:hover { background: #fee2e2 !important; border-color: #f87171; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(220,38,38,0.15); }
    .dismiss-chip:active { background: var(--error) !important; color: white; transform: scale(0.93); }

    /* Quick action strip */
    .quick-strip {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .quick-strip button {
      flex: 1;
      height: 46px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .quick-strip button:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(33,66,137,0.04);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(33,66,137,0.1);
    }

    .quick-strip button:active { transform: scale(0.95); }

    /* ── Grade Schedule Header ─────────────────── */
    .grade-header {
      background: var(--primary);
      color: white;
      padding: 18px 20px;
      border-radius: var(--radius);
      margin-bottom: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
    }

    .grade-header:hover { background: var(--primary-hover); }

    .grade-header h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }

    .grade-header .grade-current {
      font-size: 15px;
      opacity: 0.85;
      margin-top: 3px;
    }

    .grade-header .toggle-hint {
      font-size: 13px;
      opacity: 0.6;
      margin-top: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .grade-header .toggle-icon {
      transition: transform 0.25s;
      display: inline-block;
    }

    .grade-schedule-blocks {
      display: none;
      margin-bottom: 12px;
    }

    .grade-schedule-blocks.open { display: block; }

    .grade-sched-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-left: 5px solid var(--primary);
      cursor: pointer;
      transition: all 0.15s;
    }

    .grade-sched-item:nth-child(even) { border-left-color: #64748b; }
    .grade-sched-item:hover { background: rgba(33,66,137,0.03); }
    .grade-sched-item.selected {
      background: var(--accent-light);
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .grade-students-header {
      background: var(--primary);
      color: white;
      padding: 14px 20px;
      border-radius: var(--radius);
      margin: 16px 0 12px;
      font-size: 18px;
      font-weight: 700;
    }

    /* ── Bottom Sheet ──────────────────────────── */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 500;
      pointer-events: none;
      transition: background 0.3s;
    }
    .sheet-backdrop.visible {
      background: rgba(0,0,0,0.4);
      pointer-events: auto;
    }

    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      transform: translateY(100%);
      width: 100%;
      max-width: 100%;
      max-height: 75vh;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      z-index: 501;
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-sheet);
    }

    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle-area {
      padding: 10px 0 6px;
      display: flex;
      justify-content: center;
      cursor: grab;
      flex-shrink: 0;
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: #d1d5db;
    }

    .sheet-header {
      padding: 6px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sheet-title {
      font-weight: 700;
      font-size: 22px;
      color: var(--primary);
    }

    .sheet-subtitle {
      font-size: 15px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .sheet-close {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--bg);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .sheet-close:hover { background: #d1d5db; color: var(--text); transform: rotate(90deg); }

    .sheet-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px calc(var(--safe-bottom) + 20px);
      -webkit-overflow-scrolling: touch;
    }

    /* Schedule block in sheet */
    .sched-block {
      display: flex;
      align-items: stretch;
      gap: 14px;
      padding: 14px 10px;
      border-bottom: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: background 0.15s, outline-color 0.15s;
      cursor: pointer;
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sched-block:last-child { border-bottom: none; }
    .sched-block:hover { background: rgba(33,66,137,0.03); }
    .sched-block.selected {
      background: var(--accent-light);
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      border-radius: var(--radius-sm);
    }
    .sched-block.selected .sched-subject { color: var(--primary); }
    .sched-block.selected .sched-bar { background: var(--accent) !important; box-shadow: 0 0 6px rgba(246,183,86,0.4); }

    .sched-time-col {
      width: 62px;
      flex-shrink: 0;
      text-align: right;
      padding-top: 1px;
    }

    .sched-time { font-size: 15px; font-weight: 600; color: var(--primary); line-height: 1.3; }
    .sched-dur { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .sched-bar {
      width: 4px;
      border-radius: 2px;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .sched-bar.current {
      background: var(--accent);
      box-shadow: 0 0 6px rgba(246,183,86,0.4);
    }

    .sched-info { flex: 1; min-width: 0; }

    .sched-subject { font-weight: 600; font-size: 17px; color: var(--text); }
    .sched-teacher { font-size: 14px; color: var(--text-muted); margin-top: 2px; }

    .sched-room-badge {
      display: inline-flex;
      align-items: center;
      background: var(--bg);
      padding: 3px 10px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .current-indicator {
      background: var(--accent-light);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin: -6px -10px;
      position: relative;
    }

    .current-indicator::before {
      content: 'NOW';
      position: absolute;
      top: 6px;
      right: 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      background: rgba(246,183,86,0.15);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* M+E block in sheet */
    .me-block {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 10px;
      border-left: 4px solid var(--primary);
      animation: fadeUp 0.25s ease both;
      transition: all 0.15s;
      cursor: pointer;
    }

    .me-block:hover {
      background: #e2e5f0;
      border-left-color: var(--accent);
      transform: translateX(2px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .me-block.selected {
      background: var(--accent-light);
      border-left-color: var(--accent);
      border-left-width: 4px;
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .me-block .me-title { font-weight: 600; font-size: 17px; color: var(--primary); }
    .me-block.selected .me-title { color: var(--primary); }

    .me-block .me-type {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 2px 10px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
      vertical-align: middle;
    }

    .me-block .me-details {
      font-size: 15px;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.6;
    }

    /* Contact block in sheet / parents tab */
    .contact-block {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-top: 10px;
      transition: background 0.15s, box-shadow 0.15s, border-color 0.15s;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .contact-block:first-child { margin-top: 0; }
    .contact-block:hover {
      background: #e8ecf4;
      border-color: rgba(33,66,137,0.1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }

    .contact-block.selected {
      background: var(--accent-light);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent);
    }

    .contact-block-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .contact-block-title .rel-badge {
      background: var(--accent);
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
      letter-spacing: 0;
    }

    .contact-row {
      display: flex;
      align-items: center;
      padding: 5px 0;
      font-size: 16px;
    }

    .contact-icon {
      width: 24px;
      text-align: center;
      margin-right: 10px;
      font-size: 16px;
      opacity: 0.5;
    }

    .contact-row a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      font-size: 16px;
      transition: all 0.15s;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .contact-row a:hover {
      color: var(--primary-hover);
      background: rgba(33,66,137,0.08);
      text-decoration: underline;
    }

    /* ── Parent Cards ──────────────────────────── */
    .parent-card {
      background: var(--surface);
      border-radius: var(--radius);
      margin-bottom: 12px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      animation: cardIn 0.3s ease both;
      transition: box-shadow 0.15s;
    }

    .parent-card:hover { box-shadow: var(--shadow-lifted); }

    .parent-row {
      display: flex;
      align-items: center;
      padding: 18px 20px;
      gap: 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .parent-row:hover { background: rgba(33,66,137,0.03); }

    .parent-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: white;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .parent-card:hover .parent-avatar {
      transform: scale(1.08);
      box-shadow: 0 3px 10px rgba(33,66,137,0.2);
    }

    .parent-card .card-detail.open > .card-detail-inner { padding: 0 20px 18px; }

    .parent-actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    /* ── Chip Button ───────────────────────────── */
    .chip-btn {
      height: 38px;
      padding: 0 14px;
      border-radius: 19px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .chip-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(33,66,137,0.05);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(33,66,137,0.12);
    }

    .chip-btn:active { transform: scale(0.93); }
    .chip-btn.primary { background: var(--primary); border-color: var(--primary); color: white; }
    .chip-btn.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); box-shadow: 0 2px 8px rgba(33,66,137,0.25); }
    .chip-btn.accent { background: var(--error); border-color: var(--error); color: white; }
    .chip-btn.accent:hover { background: #b91c1c; border-color: #b91c1c; box-shadow: 0 2px 8px rgba(220,38,38,0.25); }

    /* ── Dismissals Tab ────────────────────────── */
    .dismissal-form-compact {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
    }

<script>
// ══════════════════════════════════════════════
// GLOBAL STATE
// ══════════════════════════════════════════════
let students = [], scheduleData = [], studentParents = [], meRecords = [], parents = [];
let dismissals = [];
const scheduleMap = new Map();
let currentTab = 'students';
let alertCheckInterval = null;
let dismissalSyncInterval = null;
let pendingDismissalUpdates = new Set();

const GRADE_COLORS = {
  'pk':'#FF6B6B','k':'#4ECDC4','1':'#FFD93D','2':'#FF8C42',
  '3':'#6CC4E8','4':'#A78BFA','5':'#B8E986','6':'#ED64A6',
  '7':'#FA8072','8':'#7C9FDB'
};

const DISMISSAL_STATUS = {
  SCHEDULED: 'scheduled',
  CALLED: 'called',
  DISMISSED: 'dismissed',
  RETURNED: 'returned'
};

// ══════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════
function throttle(fn, limit) {
  let inThrottle;
  return function(...args) {
    if (!inThrottle) { fn.apply(this, args); inThrottle = true; setTimeout(() => inThrottle = false, limit); }
  };
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function gradeNum(g) { return String(g).toLowerCase().replace(/[^0-9pk]/g, ''); }
function gradeColor(g) { return GRADE_COLORS[gradeNum(g)] || '#7C9FDB'; }
function initials(name) { return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2); }

function formatTime(raw) {
  return new Date(raw).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDateTime(date) {
  const d = new Date(date);
  const today = new Date();
  const tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate() + 1);
  const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (d.toDateString() === today.toDateString()) return `Today ${timeStr}`;
  if (d.toDateString() === tomorrow.toDateString()) return `Tomorrow ${timeStr}`;
  return `${d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' })} ${timeStr}`;
}

function calculateDuration(start, stop) {
  const mins = Math.round((new Date(stop) - new Date(start)) / 60000);
  if (mins >= 60) { const h = Math.floor(mins / 60); const m = mins % 60; return m > 0 ? `${h}h ${m}m` : `${h}h`; }
  return `${mins}m`;
}

function getCurrentClass(studentGrade) {
  const now = new Date();
  const currentMin = now.getHours() * 60 + now.getMinutes();
  const blocks = scheduleMap.get(String(studentGrade).toLowerCase()) || [];

  for (let block of blocks) {
    const s = new Date(block.start), e = new Date(block.stop);
    const sM = s.getHours() * 60 + s.getMinutes(), eM = e.getHours() * 60 + e.getMinutes();
    if (currentMin >= sM && currentMin <= eM) return { subject: block.subject, room: block.room || null };
  }

  const upcoming = blocks.filter(b => { const s = new Date(b.start); return s.getHours() * 60 + s.getMinutes() > currentMin; })
    .sort((a, b) => new Date(a.start) - new Date(b.start));
  if (upcoming.length > 0) return { subject: `Next: ${upcoming[0].subject} (${formatTime(upcoming[0].start)})`, room: upcoming[0].room || null };
  return { subject: 'No class scheduled', room: null };
}

function calculateMissedClass(grade, dismissalTime) {
  const blocks = scheduleMap.get(String(grade).toLowerCase()) || [];
  const dMin = dismissalTime.getHours() * 60 + dismissalTime.getMinutes();
  for (let block of blocks) {
    const s = new Date(block.start), e = new Date(block.stop);
    const sM = s.getHours() * 60 + s.getMinutes(), eM = e.getHours() * 60 + e.getMinutes();
    if (dMin >= sM && dMin <= eM) return `${block.subject} (${block.teacher}) - Room ${block.room}`;
  }
  return 'Between classes';
}

function isCallDownUrgent(d) {
  if (d.status !== DISMISSAL_STATUS.SCHEDULED) return false;
  return Math.floor((d.dismissalTime - new Date()) / 60000) <= 5;
}

function isGradeQuery(query) { return scheduleMap.has(query.trim().toLowerCase()); }

const throttledRenderStudents = throttle(renderStudentList, 200);
const throttledRenderParents = throttle(renderParentList, 200);
const throttledRenderDismissals = throttle(renderDismissalsList, 200);

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
function showToast(msg, urgent) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (urgent ? ' urgent' : '');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
window.onload = () => {
  google.script.run.withSuccessHandler(renderData).initializeData();

  document.getElementById('searchInput').addEventListener('input', debounce(handleSearchInput, 300));
  document.getElementById('searchClear').addEventListener('click', clearSearch);

  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  setupDismissalForm();
  setupModalHandlers();
  setupSheetHandlers();
  startAlertChecking();
  requestNotificationPermission();
  startDismissalSync();
  startCurrentClassSync();
};

// ══════════════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════════════
function renderData(response) {
  const data = JSON.parse(response);
  students = data.students;
  scheduleData = data.schedule;
  studentParents = data.studentParents;
  meRecords = data.meRecords;
  parents = data.parents;

  preprocessSchedule();
  updateSearchPlaceholder();

  if (currentTab === 'students') renderStudentList(students);
  else if (currentTab === 'parents') renderParentList(parents);
  else renderDismissalsList();
}

function preprocessSchedule() {
  scheduleMap.clear();
  scheduleData.forEach(item => {
    const key = String(item.class).trim().toLowerCase();
    if (!scheduleMap.has(key)) scheduleMap.set(key, []);
    scheduleMap.get(key).push(item);
  });
}

// ══════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('contentArea').scrollTop = 0;
  updateSearchPlaceholder();
  clearSearch();
}

function updateSearchPlaceholder() {
  const input = document.getElementById('searchInput');
  if (currentTab === 'students') input.placeholder = 'Name, Grade, or ID';
  else if (currentTab === 'parents') input.placeholder = 'Parent Name, Phone, or Student Name';
  else input.placeholder = 'Search dismissals...';
}

// ══════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════
function handleSearchInput() {
  const input = document.getElementById('searchInput');
  const clear = document.getElementById('searchClear');
  const query = input.value;

  clear.classList.toggle('show', query.length > 0);
  filterResults();
}

function clearSearch() {
  const input = document.getElementById('searchInput');
  const clear = document.getElementById('searchClear');
  input.value = '';
  clear.classList.remove('show');
  input.focus();
  if (currentTab === 'students') renderStudentList(students);
  else if (currentTab === 'parents') renderParentList(parents);
  else renderDismissalsList();
}

function filterResults() {
  const query = document.getElementById('searchInput').value.trim();
  const terms = query.split(',').map(t => t.trim().toLowerCase()).filter(t => t.length > 0);

  if (currentTab === 'students' && terms.length === 1 && isGradeQuery(terms[0])) {
    renderGradeSchedule(terms[0]);
    return;
  }

  if (currentTab === 'students') {
    throttledRenderStudents(students.filter(s =>
      terms.some(t => s.fullName.toLowerCase().includes(t) || String(s.grade).toLowerCase().includes(t) || String(s.id).toLowerCase().includes(t))
    ));
  } else if (currentTab === 'parents') {
    throttledRenderParents(parents.filter(p =>
      terms.some(t => {
        if (p.primaryContact.name && p.primaryContact.name.toLowerCase().includes(t)) return true;
        if (p.secondaryContact.name && p.secondaryContact.name.toLowerCase().includes(t)) return true;
        if (p.students && p.students.some(s => (s.fullName || s.name || '').toLowerCase().includes(t) || String(s.id || s).toLowerCase().includes(t))) return true;
        if (p.primaryContact.phone && p.primaryContact.phone.includes(t)) return true;
        if (p.secondaryContact.phone && p.secondaryContact.phone.includes(t)) return true;
        if (p.primaryContact.email && p.primaryContact.email.toLowerCase().includes(t)) return true;
        if (p.secondaryContact.email && p.secondaryContact.email.toLowerCase().includes(t)) return true;
        if (p.primaryContact.relationship && p.primaryContact.relationship.toLowerCase().includes(t)) return true;
        if (p.secondaryContact.relationship && p.secondaryContact.relationship.toLowerCase().includes(t)) return true;
        if (p.id && String(p.id).toLowerCase().includes(t)) return true;
        return false;
      })
    ));
  } else if (currentTab === 'dismissals') {
    const filtered = dismissals.filter(d =>
      terms.some(t => d.studentName.toLowerCase().includes(t) || d.grade.toLowerCase().includes(t) || d.status.toLowerCase().includes(t))
    );
    renderDismissalsList(filtered);
  }
}

function openSheet(type, name, grade, studentId) {
  const sheet = document.getElementById('bottomSheet');
  const backdrop = document.getElementById('sheetBackdrop');
  const title = document.getElementById('sheetTitle');
  const subtitle = document.getElementById('sheetSubtitle');
  const body = document.getElementById('sheetBody');

  title.textContent = `${name} · ${grade}`;

  if (type === 'schedule') {
    subtitle.textContent = "Today's Schedule";
    const blocks = scheduleMap.get(String(grade).toLowerCase()) || [];
    if (!blocks.length) {
      body.innerHTML = '<div class="empty-msg">No schedule available</div>';
    } else {
      const now = new Date();
      const nowMin = now.getHours() * 60 + now.getMinutes();
      body.innerHTML = blocks.map((b, i) => {
        const sM = new Date(b.start).getHours() * 60 + new Date(b.start).getMinutes();
        const eM = new Date(b.stop).getHours() * 60 + new Date(b.stop).getMinutes();
        const isCurrent = nowMin >= sM && nowMin <= eM;
        return `
          <div class="sched-block" style="animation-delay:${i * 0.04}s">
            <div class="sched-time-col">
              <div class="sched-time">${formatTime(b.start)}</div>
              <div class="sched-dur">${calculateDuration(b.start, b.stop)}</div>
            </div>
            <div class="sched-bar ${isCurrent ? 'current' : ''}" style="background:${isCurrent ? 'var(--accent)' : 'var(--border)'}"></div>
            <div class="sched-info ${isCurrent ? 'current-indicator' : ''}">
              <div class="sched-subject">${b.subject}</div>
              <div class="sched-teacher">${b.teacher || ''}</div>
              ${b.room ? `<span class="sched-room-badge">📍 ${b.room}</span>` : ''}
            </div>
          </div>`;
      }).join('');
    }
  } else if (type === 'me') {
    subtitle.textContent = 'Math + Electives';
    const records = meRecords.filter(r => String(r.studentId) === String(studentId));
    if (!records.length) {
      body.innerHTML = '<div class="empty-msg">No M+E records</div>';
    } else {
      body.innerHTML = records.map((m, i) => `
        <div class="me-block" style="animation-delay:${i * 0.06}s">
          <div class="me-title">${m.class} <span class="me-type">${m.type}</span></div>
          <div class="me-details">
            <strong>Teacher:</strong> ${m.teacher}<br>
            <strong>Room:</strong> ${m.room} · <strong>Ext:</strong> ${m.ext}<br>
            <strong>Period:</strong> ${m.season}
          </div>
        </div>`).join('');
    }
  } else if (type === 'parents') {
    subtitle.textContent = 'Parents & Contacts';
    // Match parents that have this student in their students array (same structure as Parents tab)
    const matching = parents.filter(p =>
      p.students && p.students.some(s => String(s.id) === String(studentId))
    );
    if (!matching.length) {
      body.innerHTML = '<div class="empty-msg">No parent contacts found</div>';
    } else {
      body.innerHTML = matching.map(p => `
        <div style="margin-bottom: 16px;">
          <div class="contact-block" style="margin-top:0;">
            <div class="contact-block-title">Primary Contact <span class="rel-badge">${p.primaryContact.relationship || 'Contact'}</span></div>
            <div style="font-weight:600; font-size:15px; color:var(--text); margin-bottom:6px;">${p.primaryContact.name || '—'}</div>
            <div class="contact-row"><span class="contact-icon">📱</span>${p.primaryContact.phone ? `<a href="tel:${p.primaryContact.phone}">${p.primaryContact.phone}</a>` : '—'}</div>
            <div class="contact-row"><span class="contact-icon">✉️</span>${p.primaryContact.email ? `<a href="mailto:${p.primaryContact.email}">${p.primaryContact.email}</a>` : '—'}</div>
          </div>
          ${p.secondaryContact.name ? `
          <div class="contact-block">
            <div class="contact-block-title">Secondary Contact <span class="rel-badge">${p.secondaryContact.relationship || 'Contact'}</span></div>
            <div style="font-weight:600; font-size:15px; color:var(--text); margin-bottom:6px;">${p.secondaryContact.name}</div>
            <div class="contact-row"><span class="contact-icon">📱</span>${p.secondaryContact.phone ? `<a href="tel:${p.secondaryContact.phone}">${p.secondaryContact.phone}</a>` : '—'}</div>
            <div class="contact-row"><span class="contact-icon">✉️</span>${p.secondaryContact.email ? `<a href="mailto:${p.secondaryContact.email}">${p.secondaryContact.email}</a>` : '—'}</div>
          </div>` : ''}
          <div style="margin-top:8px; font-size:12px; color:var(--text-muted);">
            <strong>Students:</strong> ${(p.students || []).map(s => `${s.fullName || s.name} (${s.homeroom || s.homeroomSection || ''})`).join(', ')}
          </div>
        </div>
      `).join('');
    }
  }

  backdrop.classList.add('visible');
  requestAnimationFrame(() => sheet.classList.add('open'));
}

  document.getElementById('bottomSheet').classList.remove('open');
  setTimeout(() => document.getElementById('sheetBackdrop').classList.remove('visible'), 300);

function setDefaultDismissalTime() {
  const dt = new Date();
  dt.setMinutes(dt.getMinutes() + 30);
  const offset = dt.getTimezoneOffset() * 60000;
  document.getElementById('dismissalTime').value = new Date(dt.getTime() - offset).toISOString().slice(0, 16);
}

function clearDismissalForm() {
  document.getElementById('dismissalStudent').value = '';
  document.getElementById('dismissalStudentId').value = '';
  document.getElementById('studentDropdownList').classList.remove('show');
  setDefaultDismissalTime();
}

function setupSearchableDropdown() {
  const input = document.getElementById('dismissalStudent');
  const dropdown = document.getElementById('studentDropdownList');
  const hidden = document.getElementById('dismissalStudentId');
  if (!input || !dropdown || !hidden) return;

  let highlighted = -1, filtered = [];

  input.addEventListener('input', () => {
    const q = input.value.toLowerCase().trim();
    highlighted = -1;
    hidden.value = '';
    filtered = q === '' ? [...students] : students.filter(s =>
      s.fullName.toLowerCase().includes(q) || s.grade.toLowerCase().includes(q) || s.id.toLowerCase().includes(q)
    );
    renderDropdown(filtered, highlighted);
    dropdown.classList.add('show');
  });

  input.addEventListener('focus', () => {
    filtered = [...students];
    renderDropdown(filtered, highlighted);
    dropdown.classList.add('show');
  });

  input.addEventListener('blur', () => setTimeout(() => dropdown.classList.remove('show'), 150));

  input.addEventListener('keydown', (e) => {
    if (!dropdown.classList.contains('show')) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); highlighted = Math.min(highlighted + 1, filtered.length - 1); renderDropdown(filtered, highlighted); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); highlighted = Math.max(highlighted - 1, -1); renderDropdown(filtered, highlighted); }
    else if (e.key === 'Enter') { e.preventDefault(); if (highlighted >= 0 && filtered[highlighted]) selectDropdownStudent(filtered[highlighted]); }
    else if (e.key === 'Escape') { dropdown.classList.remove('show'); input.blur(); }
  });

  function renderDropdown(list, hi) {
    dropdown.innerHTML = '';
    if (!list.length) { dropdown.innerHTML = '<div class="dropdown-empty">No students found</div>'; return; }
    list.forEach((s, i) => {
      const item = document.createElement('div');
      item.className = 'dropdown-item' + (i === hi ? ' highlighted' : '');
      item.innerHTML = `<span style="font-weight:600">${s.fullName}</span><span class="student-grade">${s.grade}</span>`;
      item.addEventListener('mousedown', (e) => { e.preventDefault(); selectDropdownStudent(s); });
      item.addEventListener('mouseenter', () => {
        dropdown.querySelectorAll('.dropdown-item').forEach(d => d.classList.remove('highlighted'));
        item.classList.add('highlighted');
        highlighted = i;
      });
      dropdown.appendChild(item);
    });
  }

  function selectDropdownStudent(s) {
    input.value = `${s.fullName} (${s.grade})`;
    hidden.value = s.id;
    dropdown.classList.remove('show');
  }
}

function scheduleDismissal() {
  const studentId = document.getElementById('dismissalStudentId').value;
  const timeVal = document.getElementById('dismissalTime').value;
  if (!studentId || !timeVal) { showToast('Please fill in all fields'); return; }

  const student = students.find(s => s.id === studentId);
  if (!student) { showToast('Student not found'); return; }

  const dismissalDateTime = new Date(timeVal);
  const dismissal = {
    id: `dismissal_${Date.now()}`,
    studentId, studentName: student.fullName, grade: student.grade,
    bus: student.bus || null, club: student.club || null,
    dismissalTime: dismissalDateTime, status: DISMISSAL_STATUS.SCHEDULED,
    scheduledAt: new Date(), missedClass: calculateMissedClass(student.grade, dismissalDateTime),
    currentClass: getCurrentClass(student.grade)
  };

  dismissals.push(dismissal);
  clearDismissalForm();
  renderDismissalsList();
  updateDismissBadge();

  if (typeof google !== 'undefined' && google.script && google.script.run) {
    const backend = { ...dismissal, dismissalTime: dismissal.dismissalTime.toISOString(), scheduledAt: dismissal.scheduledAt.toISOString() };
    google.script.run
      .withSuccessHandler(() => showToast(`Dismissal scheduled: ${student.fullName} at ${formatTime(dismissalDateTime)}`))
      .withFailureHandler(() => showToast(`Scheduled locally (sync failed)`))
      .saveDismissal(backend);
  } else {
    showToast(`Scheduled: ${student.fullName} at ${formatTime(dismissalDateTime)}`);
  }
}

function renderDismissalsList(list) {
  const container = document.getElementById('dismissalsList');
  const today = new Date(); today.setHours(0, 0, 0, 0);

  const source = list || dismissals;
  const sorted = [...source]
    .filter(d => new Date(d.dismissalTime) >= today && d.status !== DISMISSAL_STATUS.DISMISSED && d.status !== DISMISSAL_STATUS.RETURNED)
    .sort((a, b) => new Date(a.dismissalTime) - new Date(b.dismissalTime));

  if (!sorted.length) {
    container.innerHTML = '<div class="empty-msg"><div class="empty-icon">📋</div>No dismissals scheduled</div>';
    return;
  }

  container.innerHTML = '';
  sorted.forEach((d, i) => {
    const urgent = isCallDownUrgent(d);
    const student = students.find(s => s.id === d.studentId);
    const bus = d.bus || (student ? student.bus : null) || '—';
    const club = d.club || (student ? student.club : null) || '—';
    const timeStr = formatDateTime(d.dismissalTime);

    const card = document.createElement('div');
    card.className = 'dismiss-card' + (urgent ? ' urgent' : '');
    card.style.animationDelay = `${Math.min(i, 10) * 0.04}s`;

    card.innerHTML = `
      <div class="dismiss-time-block">
        <div class="time">${new Date(d.dismissalTime).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }).split(' ')[0]}</div>
        <div class="period">${new Date(d.dismissalTime).toLocaleTimeString([], { hour: 'numeric' }).split(' ')[1] || ''}</div>
      </div>
      <div class="dismiss-info">
        <div class="dismiss-name" data-name="${d.studentName.replace(/"/g, '&quot;')}">${d.studentName}</div>
        <div class="dismiss-meta">${d.grade} · Bus ${bus} · Club ${club}</div>
        ${d.missedClass ? `<div class="dismiss-meta" style="color:var(--primary);">📞 ${d.missedClass}</div>` : ''}
      </div>
      <div class="dismiss-actions">
        ${d.status === DISMISSAL_STATUS.SCHEDULED ? `<button class="chip-btn accent" data-action="call" data-did="${d.id}">${urgent ? 'CALL!' : 'Call'}</button>` : ''}
        ${d.status === DISMISSAL_STATUS.CALLED ? `<button class="chip-btn" data-action="dismiss" data-did="${d.id}" style="background:var(--success);border-color:var(--success);color:white;">Done</button>` : ''}
        <button class="chip-btn" data-action="edit" data-did="${d.id}">✏️</button>
        <button class="chip-btn" data-action="delete" data-did="${d.id}" style="color:var(--error);border-color:#fecaca;">🗑</button>
      </div>
    `;

    // Click student name
    card.querySelector('.dismiss-name').addEventListener('click', () => searchForStudentByName(d.studentName));

    // Action buttons
    card.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const action = btn.dataset.action;
        const did = btn.dataset.did;
        if (action === 'call') markAsCalled(did);
        else if (action === 'dismiss') markAsDismissed(did);
        else if (action === 'edit') editDismissal(did);
        else if (action === 'delete') deleteDismissal(did);
      });
    });

    container.appendChild(card);
  });
}

function quickDismiss(studentId) {
  const student = students.find(s => s.id === studentId);
  if (!student) return;
  switchTab('dismissals');
  document.getElementById('dismissalStudent').value = `${student.fullName} (${student.grade})`;
  document.getElementById('dismissalStudentId').value = studentId;
  const now = new Date();
  const offset = now.getTimezoneOffset() * 60000;
  document.getElementById('dismissalTime').value = new Date(now.getTime() - offset).toISOString().slice(0, 16);
  setTimeout(() => document.getElementById('dismissalTime').focus(), 100);
}

// Status updates with pending guard
function updateStatus(dismissalId, newStatus, extraField, extraValue) {
  const d = dismissals.find(x => x.id === dismissalId);
  if (!d) return;
  pendingDismissalUpdates.add(dismissalId);
  d.status = newStatus;
  d[extraField] = new Date();
  renderDismissalsList();
  updateDismissBadge();
  showToast(`${d.studentName} marked as ${newStatus}`);

  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(() => pendingDismissalUpdates.delete(dismissalId))
      .withFailureHandler(() => pendingDismissalUpdates.delete(dismissalId))
      .updateDismissalStatus(dismissalId, newStatus, { [extraField]: d[extraField].toISOString() });
  } else { pendingDismissalUpdates.delete(dismissalId); }
}

function markAsCalled(id) { updateStatus(id, DISMISSAL_STATUS.CALLED, 'calledAt', null); }
function markAsDismissed(id) { updateStatus(id, DISMISSAL_STATUS.DISMISSED, 'dismissedAt', null); }
function markAsReturned(id) { updateStatus(id, DISMISSAL_STATUS.RETURNED, 'returnedAt', null); }

function markMultipleAsCalled(idsString) {
  const ids = idsString.split(',');
  let count = 0, names = [];
  ids.forEach(id => {
    const d = dismissals.find(x => x.id === id);
    if (d && d.status === DISMISSAL_STATUS.SCHEDULED) {
      pendingDismissalUpdates.add(id);
      d.status = DISMISSAL_STATUS.CALLED;
      d.calledAt = new Date();
      names.push(d.studentName);
      count++;
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(() => pendingDismissalUpdates.delete(id))
          .withFailureHandler(() => pendingDismissalUpdates.delete(id))
          .updateDismissalStatus(id, DISMISSAL_STATUS.CALLED, { calledAt: d.calledAt.toISOString() });
      }
    }
  });
  if (count > 0) {
    renderDismissalsList();
    updateDismissBadge();
    showToast(count === 1 ? `${names[0]} called` : `${count} students called`);
  }
}

function editDismissal(id) {
  const d = dismissals.find(x => x.id === id);
  if (!d) return;
  const student = students.find(s => s.id === d.studentId);
  if (student) {
    document.getElementById('dismissalStudent').value = `${student.fullName} (${student.grade})`;
    document.getElementById('dismissalStudentId').value = d.studentId;
  }
  const offset = d.dismissalTime.getTimezoneOffset() * 60000;
  document.getElementById('dismissalTime').value = new Date(d.dismissalTime.getTime() - offset).toISOString().slice(0, 16);
  dismissals = dismissals.filter(x => x.id !== id);
  renderDismissalsList();
  setTimeout(() => document.getElementById('dismissalTime').focus(), 100);
}

function deleteDismissal(id) {
  const d = dismissals.find(x => x.id === id);
  if (!d || !confirm(`Delete dismissal for ${d.studentName}?`)) return;
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(() => {
        dismissals = dismissals.filter(x => x.id !== id);
        renderDismissalsList();
        updateDismissBadge();
        showToast(`Deleted: ${d.studentName}`);
      })
      .withFailureHandler((err) => showToast(`Delete failed: ${err.message}`))
      .deleteDismissal(id);
  } else {
    dismissals = dismissals.filter(x => x.id !== id);
    renderDismissalsList();
    updateDismissBadge();
    showToast(`Deleted: ${d.studentName}`);
  }
}

// ══════════════════════════════════════════════
// DISMISSAL SYNC
// ══════════════════════════════════════════════
function startDismissalSync() {
  try {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      syncDismissalsFromBackend();
      dismissalSyncInterval = setInterval(syncDismissalsFromBackend, 15000);
    }
  } catch (e) { console.error('Sync start error:', e); }
}

function syncDismissalsFromBackend() {
  if (typeof google === 'undefined' || !google.script) return;
  google.script.run
    .withSuccessHandler((backend) => {
      if (backend && Array.isArray(backend)) {
        const processed = backend.map(r => ({
          ...r,
          dismissalTime: new Date(r.dismissalTime),
          scheduledAt: new Date(r.scheduledAt),
          calledAt: r.calledAt ? new Date(r.calledAt) : null,
          dismissedAt: r.dismissedAt ? new Date(r.dismissedAt) : null,
          returnedAt: r.returnedAt ? new Date(r.returnedAt) : null
        }));
        dismissals = processed.map(remote => {
          if (pendingDismissalUpdates.has(remote.id)) {
            const local = dismissals.find(d => d.id === remote.id);
            return local || remote;
          }
          return remote;
        });
        if (currentTab === 'dismissals') renderDismissalsList();
        updateDismissBadge();
      }
    })
    .withFailureHandler((e) => console.error('Sync failed:', e))
    .getDismissals();
}

// ══════════════════════════════════════════════
// ALERT SYSTEM
// ══════════════════════════════════════════════
function startAlertChecking() {
  alertCheckInterval = setInterval(checkForAlerts, 30000);
  checkForAlerts();
}

function checkForAlerts() {
  const now = new Date();
  const groups = new Map();

  dismissals.forEach(d => {
    if (d.status !== DISMISSAL_STATUS.SCHEDULED) return;
    const mins = Math.floor((d.dismissalTime - now) / 60000);
    if (mins <= 5 && mins > 0) {
      const key = `calldown_${formatTime(d.dismissalTime)}`;
      if (!groups.has(key)) groups.set(key, { type: 'calldown', dismissals: [], minutesUntil: mins });
      groups.get(key).dismissals.push(d);
    }
    if (mins <= 0) {
      const key = `urgent_${formatTime(d.dismissalTime)}`;
      if (!groups.has(key)) groups.set(key, { type: 'urgent', dismissals: [] });
      groups.get(key).dismissals.push(d);
    }
  });

  groups.forEach(g => {
    const names = g.dismissals.map(d => d.studentName).join(', ');
    const time = formatTime(g.dismissals[0].dismissalTime);
    const multi = g.dismissals.length > 1;

    if (g.type === 'calldown') {
      const msg = multi ? `Call down ${g.dismissals.length} students at ${time}` : `Call down ${names} — ${g.minutesUntil}min`;
      showToast(msg, true);
      showModalAlert(g.dismissals, multi ? `Call Down ${g.dismissals.length} Students!` : `Call Down ${names}!`);
      showSystemNotification(msg);
    } else {
      const msg = multi ? `URGENT: ${g.dismissals.length} dismissals overdue!` : `URGENT: ${names} overdue!`;
      showToast(msg, true);
      showModalAlert(g.dismissals, 'URGENT DISMISSAL!');
      showSystemNotification(msg);
    }
  });

  updateDismissBadge();
}

function updateDismissBadge() {
  const hasUrgent = dismissals.some(d => isCallDownUrgent(d));
  document.getElementById('dismissBadge').classList.toggle('show', hasUrgent);
}

// ══════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════
let currentModalDismissals = [];

function setupModalHandlers() {
  const modal = document.getElementById('modalOverlay');
  document.getElementById('modalCallButton').addEventListener('click', () => {
    if (currentModalDismissals.length > 0) {
      markMultipleAsCalled(currentModalDismissals.map(d => d.id).join(','));
      hideModal();
    }
  });
  document.getElementById('modalCloseButton').addEventListener('click', hideModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) hideModal(); });
}

function showModalAlert(dismissalsList, title) {
  if (!Array.isArray(dismissalsList)) dismissalsList = [dismissalsList];
  currentModalDismissals = dismissalsList;
  document.getElementById('modalTitle').textContent = title;

  const msg = document.getElementById('modalMessage');
  const time = formatTime(dismissalsList[0].dismissalTime);
  const cards = dismissalsList.map(d => `
    <div class="modal-student-card">
      <div class="name">${d.studentName}</div>
      <div class="grade">Grade: ${d.grade}</div>
      ${d.missedClass ? `<div class="class-info"><strong>Call:</strong> ${d.missedClass}</div>` : ''}
    </div>`).join('');

  msg.innerHTML = `
    <div class="modal-time-info"><strong>Dismissal Time:</strong> ${time}${dismissalsList.length > 1 ? ` — <strong>${dismissalsList.length} Students</strong>` : ''}</div>
    <div style="max-height:250px; overflow-y:auto; margin-top:8px;">${cards}</div>`;

  document.getElementById('modalCallButton').textContent = dismissalsList.length > 1 ? `Mark All ${dismissalsList.length} as Called` : 'Mark as Called';
  document.getElementById('modalOverlay').classList.add('show');
}

function hideModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  currentModalDismissals = [];
}

// ══════════════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════════════
function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
}

function showSystemNotification(message) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('School Dismissal Alert', { body: message });
  }
}

// ══════════════════════════════════════════════
// CURRENT CLASS SYNC
// ══════════════════════════════════════════════
function startCurrentClassSync() {
  setInterval(() => {
    if (currentTab === 'students') {
      document.querySelectorAll('#studentList .student-card').forEach(card => {
        const nameEl = card.querySelector('.card-name');
        const metaEl = card.querySelector('.card-meta');
        if (!nameEl || !metaEl) return;
        const student = students.find(s => s.fullName === nameEl.textContent);
        if (!student) return;
        const cls = getCurrentClass(student.grade);
        const room = cls.room || student.room || '';
        metaEl.innerHTML = `<span>${room ? `${student.grade} · ${cls.subject} · ${room}` : `${student.grade} · ${cls.subject}`}</span>`;
      });
    }
  }, 60000);
}

// Cleanup
window.addEventListener('beforeunload', () => {
  if (alertCheckInterval) clearInterval(alertCheckInterval);
  if (dismissalSyncInterval) clearInterval(dismissalSyncInterval);
});
</script>
