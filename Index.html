<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combined Directory with Dismissals</title>
  
<style>
:root {
  /* Harmonized, eye-friendly color palette */
  --color-primary: #214289;        
  --color-primary-hover: #1a356c;  
  --color-secondary: #f6b756;      
  --color-bg: #f5f7fa;            
  --color-surface: #ffffff;        
  --color-border: #d1d5db;         
  --color-text: #1f2937;          
  --color-text-muted: #6b7280;    
  --color-success: #3fa56b;       
  --color-error: #d14b4b;         
  --color-warning: #e89d3c;       
  --color-on-dark: #f9fafb;       
  --color-urgent: #dc2626;        /* Red for urgent alerts */
  --color-scheduled: #2563eb;     /* Blue for scheduled */
  --color-called: #f59e0b;        /* Amber for called */
  --color-dismissed: #059669;     /* Green for dismissed */
  --color-returned: #6b7280;      /* Gray for returned */
  
  /* Spacing scale */
  --space-xs: 0.25rem;
  --space-sm: 0.5rem;
  --space-md: 0.75rem;
  --space-lg: 1rem;
  --space-xl: 1.5rem;
  --space-2xl: 2rem;
  
  /* Typography */
  --font-size-sm: 0.875rem;
  --font-size-base: 1rem;
  --font-size-lg: 1.125rem;
  --font-size-xl: 1.25rem;
  --font-size-2xl: 1.5rem;
  --font-size-3xl: 2rem;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;
  
  /* Layout */
  --radius: 0.375rem;
  --radius-lg: 0.75rem;
  --shadow-sm: 0 2px 4px rgba(0,0,0,0.15);
  --shadow-md: 0 4px 8px rgba(0,0,0,0.25);
  --transition-fast: 0.15s ease;
  --transition-base: 0.2s ease;
  
  /* Container */
  --container-max-width: 1200px;
}

*, *::before, *::after {
  box-sizing: border-box;
}

/* Harmonized darker background using new palette */
body::before {
  content: "";
  position: fixed;
  top: -20px;
  left: -20px;
  width: calc(100vw + 40px);
  height: calc(100vh + 40px);
  background: 
    linear-gradient(45deg, #f7ad4c 0%, #f7ad4c 20%, transparent 20%, transparent 100%),
    linear-gradient(45deg, rgba(0, 0, 0, 0.3) 25%, transparent 25%, transparent 50%, rgba(240, 240, 240, 0.3) 50%, rgba(240, 240, 240, 0.3) 75%, transparent 75%, transparent 100%),
    #214289;
  background-attachment: fixed;
  filter: blur(6px);
  z-index: -1;
}

/* Subtle texture overlay using new secondary color */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-image: 
    radial-gradient(circle at 20% 20%, rgba(246, 183, 86, 0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(33, 66, 137, 0.12) 0%, transparent 50%);
  z-index: -1;
}

body {
  margin: 0;
  padding: var(--space-lg);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: var(--color-text);
  line-height: 1.5;
}

.background-text {
  position: fixed;
  top: var(--space-lg);
  right: var(--space-lg);
  font-size: var(--font-size-xl);
  font-weight: var(--font-weight-bold);
  color: rgba(249, 250, 251, 0.15);
  pointer-events: none;
  z-index: 10;
}

/* Main container */
.container {
  max-width: var(--container-max-width);
  margin: 0 auto;
  background: var(--color-bg);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: 
    0 10px 25px rgba(0, 0, 0, 0.3),
    0 6px 10px rgba(0, 0, 0, 0.2),
    0 0 0 1px rgba(255, 255, 255, 0.1);
  border: 3px solid white;
}

/* Header */
.header {
  background: var(--color-primary);
  padding: var(--space-xl);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-lg);
  border-bottom: 5px solid #f6b756;
}

.header-left {
  display: flex;
  align-items: center;
}

.header-right {
  display: flex;
  align-items: center;
  flex: 1;
}

.header-logo {
  height: 85px;
  width: auto;
}

/* Alert Indicator */
.alert-indicator {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--color-urgent);
  color: white;
  padding: var(--space-md) var(--space-xl);
  border-radius: var(--radius-lg);
  font-weight: var(--font-weight-bold);
  box-shadow: var(--shadow-md);
  z-index: 1000;
  display: none;
  animation: alertPulse 2s infinite;
}

.alert-indicator.show {
  display: block;
}

@keyframes alertPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

/* Tab Navigation */
.tab-navigation {
  max-width: var(--container-max-width);
  margin: 0 auto;
  background: transparent;
  display: flex;
  justify-content: flex-end;
  padding: 0 var(--space-lg);
  margin-bottom: -3px;
  position: relative;
  z-index: 10;
}

.tab-button {
  padding: var(--space-md) var(--space-xl);
  border: 3px solid white;
  background: #e1e7f0;
  color: #6b7280;
  font-size: var(--font-size-lg);
  font-weight: var(--font-weight-semibold);
  cursor: pointer;
  transition: all var(--transition-fast);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  margin-right: var(--space-sm);
  box-shadow: 
    0 -5px 15px rgba(0, 0, 0, 0.2),
    0 -3px 6px rgba(0, 0, 0, 0.1);
  position: relative;
}

.tab-button:last-child {
  margin-right: 0;
}

.tab-button:hover {
  background: #d1dae6;
  color: var(--color-text);
  border-bottom-color: transparent;
  transform: translateY(-2px);
  box-shadow: 
    0 -8px 20px rgba(0, 0, 0, 0.25),
    0 -4px 8px rgba(0, 0, 0, 0.15);
}

.tab-button.active {
  background: var(--color-primary);
  color: var(--color-on-dark);
  border-bottom: none;
  transform: translateY(0);
  box-shadow: 
    0 -5px 15px rgba(0, 0, 0, 0.2),
    0 -3px 6px rgba(0, 0, 0, 0.1);
  z-index: 11;
}

.tab-button.active::after {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--color-primary);
  z-index: 1;
}

.tab-button.active:hover {
  background: var(--color-primary);
  color: var(--color-on-dark);
  transform: translateY(-2px);
  box-shadow: 
    0 -8px 20px rgba(0, 0, 0, 0.25),
    0 -4px 8px rgba(0, 0, 0, 0.15);
}

.tab-button.active:hover::after {
  background: var(--color-primary);
}

/* Tab Content Areas */
.tab-content-area {
  display: none;
}

.tab-content-area.active {
  display: block;
}

/* Search bar container and input */
.search-container {
  position: relative;
  width: 100%;
}

.search-bar {
  width: 100%;
  padding: var(--space-md) var(--space-lg);
  padding-right: 60px;
  font-size: var(--font-size-lg);
  border: 2px solid var(--color-border);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.9);
  transition: all var(--transition-fast);
  min-height: 50px;
}

.search-bar:focus {
  outline: none;
  border-color: var(--color-secondary);
  background: white;
  box-shadow: 0 0 0 3px rgba(246, 183, 86, 0.3);
}

.search-bar::placeholder {
  color: var(--color-text-muted);
}

/* Clear button */
.search-clear-button {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 34px;
  border: none;
  background: transparent;
  color: var(--color-text-muted);
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.3;
  transition: all var(--transition-fast);
  z-index: 2;
  border-radius: var(--radius);
}

.search-clear-button:hover {
  color: var(--color-text);
  background: rgba(0, 0, 0, 0.05);
  transform: translateY(-50%) scale(1.05);
}

.search-clear-button:active {
  transform: translateY(-50%) scale(0.95);
  background: rgba(0, 0, 0, 0.1);
}

.search-clear-button.visible {
  opacity: 1;
}

/* List containers */
.list-container {
  background: var(--color-surface);
  margin: var(--space-lg);
  border-radius: var(--radius);
  border: 1px solid var(--color-border);
  overflow: hidden;
  max-height: 65vh;
  overflow-y: auto;
}

.list {
  list-style: none;
  padding: var(--space-lg);
  margin: 0;
  display: grid;
  gap: var(--space-md);
}

/* Dismissal Form Styles */
.dismissal-form {
  background: var(--color-surface);
  margin: var(--space-xs);
  border-radius: var(--radius);
  border: 1px solid var(--color-border);
  padding: var(--space-xs);
}

.form-section {
  margin-bottom: var(--space-xl);
}

.form-section h3 {
  color: var(--color-primary);
  margin: 0 0 var(--space-lg) 0;
  font-size: var(--font-size-xl);
  font-weight: var(--font-weight-bold);
}

/* Extended form row for dismissal form with buttons inline */
.form-row-extended {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: var(--space-lg);
  margin-bottom: var(--space-lg);
  align-items: end; /* Align items to bottom to align with inputs */
}

.form-buttons {
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  min-width: fit-content;
}

.form-buttons label {
  visibility: hidden; /* Keep space but hide the empty label */
  margin-bottom: var(--space-xs);
}

.button-group {
  display: flex;
  flex-direction: row;
  gap: var(--space-sm);
  white-space: nowrap;
  align-items: center;
}

.button-group .btn {
  padding: var(--space-md) var(--space-lg);
  font-size: var(--font-size-base);
  font-weight: var(--font-weight-semibold);
  min-width: 100px;
  flex-shrink: 0; /* Prevent buttons from shrinking */
}

/* Mobile responsive adjustments */
@media (max-width: 768px) {
  .form-row-extended {
    grid-template-columns: 1fr;
    gap: var(--space-md);
  }
  
  .button-group {
    justify-content: stretch;
    margin-top: var(--space-md);
  }
  
  .button-group .btn {
    flex: 1;
    min-width: auto;
  }
  
  .form-buttons label {
    display: none; /* Hide completely on mobile since we don't need the spacing */
  }
}

.form-group {
  display: flex;
  flex-direction: column;
}

.form-group label {
  font-weight: var(--font-weight-semibold);
  color: var(--color-text);
  margin-bottom: var(--space-xs);
  font-size: var(--font-size-sm);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.form-group input,
.form-group select,
.form-group textarea {
  padding: var(--space-md);
  border: 2px solid var(--color-border);
  border-radius: var(--radius);
  font-size: var(--font-size-base);
  background: var(--color-surface);
  transition: all var(--transition-fast);
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--color-secondary);
  box-shadow: 0 0 0 3px rgba(246, 183, 86, 0.3);
}

.form-group textarea {
  resize: vertical;
  min-height: 80px;
}

/* Searchable Dropdown Styles */
.searchable-dropdown {
  position: relative;
  width: 100%;
}

.searchable-dropdown input[type="text"] {
  width: 100%;
  padding: var(--space-md);
  font-size: var(--font-size-base);
  border: 2px solid var(--color-border);
  border-radius: var(--radius);
  background: var(--color-surface);
  transition: all var(--transition-fast);
  cursor: text;
}

.searchable-dropdown input[type="text"]:focus {
  outline: none;
  border-color: var(--color-secondary);
  box-shadow: 0 0 0 3px rgba(246, 183, 86, 0.3);
}

.dropdown-list {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--color-surface);
  border: 2px solid var(--color-secondary);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  max-height: 200px;
  overflow-y: auto;
  z-index: 1000;
  display: none;
  box-shadow: var(--shadow-md);
}

.dropdown-list.show {
  display: block;
}

.dropdown-item {
  padding: var(--space-md);
  cursor: pointer;
  border-bottom: 1px solid var(--color-border);
  transition: all var(--transition-fast);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dropdown-item:last-child {
  border-bottom: none;
}

.dropdown-item:hover,
.dropdown-item.highlighted {
  background: rgba(246, 183, 86, 0.1);
  color: var(--color-primary);
}

.dropdown-item.selected {
  background: var(--color-primary);
  color: white;
}

.dropdown-item .student-name {
  font-weight: var(--font-weight-semibold);
}

.dropdown-item .student-grade {
  font-size: var(--font-size-sm);
  color: var(--color-text-muted);
  margin-left: var(--space-sm);
}

.dropdown-item.selected .student-grade {
  color: rgba(255, 255, 255, 0.8);
}

.dropdown-empty {
  padding: var(--space-md);
  text-align: center;
  color: var(--color-text-muted);
  font-style: italic;
}

.form-actions {
  display: flex;
  gap: var(--space-md);
  justify-content: flex-end;
  padding-top: var(--space-lg);
  border-top: 1px solid var(--color-border);
}

.btn {
  padding: var(--space-md) var(--space-xl);
  border: 2px solid;
  border-radius: var(--radius);
  font-size: var(--font-size-base);
  font-weight: var(--font-weight-semibold);
  cursor: pointer;
  transition: all var(--transition-fast);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  min-width: 120px;
}

.btn-primary {
  background: var(--color-primary);
  border-color: var(--color-primary);
  color: white;
}

.btn-primary:hover {
  background: var(--color-primary-hover);
  border-color: var(--color-primary-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.btn-secondary {
  background: transparent;
  border-color: var(--color-border);
  color: var(--color-text);
}

.btn-secondary:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.btn-urgent {
  background: var(--color-urgent);
  border-color: var(--color-urgent);
  color: white;
  animation: urgentPulse 2s infinite;
}

@keyframes urgentPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
  50% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
}

/* Dismissal List Styles */
.dismissal-item {
  background: var(--color-surface);
  border: 2px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-md);
  transition: all var(--transition-fast);
  position: relative;
}

.dismissal-item.urgent {
  border-color: var(--color-urgent);
  background: rgba(220, 38, 38, 0.05);
  box-shadow: 0 0 10px rgba(220, 38, 38, 0.2);
}

.dismissal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-md);
}

.dismissal-student {
  font-size: var(--font-size-xl);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
}

.dismissal-time {
  font-size: var(--font-size-lg);
  font-weight: var(--font-weight-semibold);
  color: var(--color-text);
}

.dismissal-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
  margin-bottom: var(--space-md);
}

@media (max-width: 768px) {
  .dismissal-details {
    grid-template-columns: 1fr;
  }
}

.dismissal-detail {
  display: flex;
  flex-direction: column;
}

.dismissal-detail-label {
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-semibold);
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--space-xs);
}

.dismissal-detail-value {
  font-size: var(--font-size-base);
  font-weight: var(--font-weight-medium);
  color: var(--color-text);
}

.status-badge {
  padding: var(--space-xs) var(--space-md);
  border-radius: var(--radius);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-bold);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.status-scheduled {
  background: var(--color-scheduled);
  color: white;
}

.status-called {
  background: var(--color-called);
  color: white;
}

.status-dismissed {
  background: var(--color-dismissed);
  color: white;
}

.status-returned {
  background: var(--color-returned);
  color: white;
}

.dismissal-actions {
  display: flex;
  gap: var(--space-sm);
  flex-wrap: wrap;
}

.btn-sm {
  padding: var(--space-sm) var(--space-md);
  font-size: var(--font-size-sm);
  min-width: 80px;
}

/* Shared Item Card Styles */
.item {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all var(--transition-base);
  cursor: pointer;
  box-shadow: var(--shadow-sm);
}

.item:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-sm);
  border-color: rgba(33, 66, 137, 0.3);
}

/* Item Header */
.item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-lg);
  background: linear-gradient(135deg, #f8f9ff 0%, #e8f0ff 100%);
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

.item-main-info {
  flex: 1;
}

.item-name {
  font-size: var(--font-size-2xl);
  font-weight: var(--font-weight-bold);
  margin: 0 0 var(--space-xs) 0;
  color: var(--color-primary);
}

.item-subtitle {
  font-size: var(--font-size-base);
  font-weight: var(--font-weight-medium);
  color: var(--color-text-muted);
  margin: 0;
  line-height: 1.3;
}

.expand-icon {
  width: 24px;
  height: 24px;
  color: var(--color-primary);
  transition: transform var(--transition-base);
  font-size: var(--font-size-xl);
  font-weight: var(--font-weight-bold);
}

.item.expanded .expand-icon {
  transform: rotate(45deg);
}

/* Item Details Dropdown */
.item-details {
  background: rgba(248, 250, 252, 0.8);
  padding: 0;
  margin: 0;
  overflow: hidden;
  max-height: 0;
  transition: all 0.3s ease;
  opacity: 0;
  visibility: hidden;
  border-top: 1px solid rgba(0,0,0,0.05);
}

.item-details.expanded {
  max-height: 600px;
  padding: var(--space-lg);
  opacity: 1;
  visibility: visible;
}

/* Student-specific styles */
.detail-row {
  display: flex;
  align-items: center;
  padding: var(--space-sm) 0;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

.detail-row:last-child {
  border-bottom: none;
}

.detail-label {
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-semibold);
  color: var(--color-text-muted);
  width: 120px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.detail-value {
  font-size: var(--font-size-base);
  font-weight: var(--font-weight-medium);
  color: var(--color-text);
  flex: 1;
}

/* Parent-specific styles */
.contacts-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
}

@media (max-width: 768px) {
  .contacts-container {
    grid-template-columns: 1fr;
    gap: var(--space-md);
  }
}

.contact-section {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: var(--space-md);
  margin-bottom: 0;
}

.contact-title {
  font-size: var(--font-size-base);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  margin: 0 0 var(--space-sm) 0;
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  flex-wrap: wrap;
}

.contact-badge {
  background: var(--color-secondary);
  color: white;
  padding: var(--space-xs) var(--space-sm);
  border-radius: var(--radius);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-semibold);
  white-space: nowrap;
}

.contact-info {
  display: grid;
  gap: var(--space-xs);
}

.contact-item {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-xs);
  background: rgba(248, 250, 252, 0.5);
  border-radius: var(--radius);
  border: 1px solid rgba(0,0,0,0.05);
}

.contact-label {
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-semibold);

  <script>
    // Global data variables
    let students = [], scheduleData = [], studentParents = [], meRecords = [], parents = [];
    let dismissals = []; // Dismissal tracking
    const scheduleMap = new Map();
    let currentTab = 'students';
    let alertCheckInterval = null;
    let dismissalSyncInterval = null;

    // Track pending updates to prevent sync conflicts
let pendingDismissalUpdates = new Set();
    
    // Selected items for student tabs and contacts
    let selectedScheduleBlock = null;
    let selectedMERecord = null;
    let selectedContact = null;

    // Dismissal status constants
    const DISMISSAL_STATUS = {
      SCHEDULED: 'scheduled',
      CALLED: 'called', 
      DISMISSED: 'dismissed',
      RETURNED: 'returned'
    };

    // Utility functions
    function throttle(fn, limit) {
      let inThrottle;
      return function(...args) {
        if (!inThrottle) {
          fn.apply(this, args);
          inThrottle = true;
          setTimeout(() => inThrottle = false, limit);
        }
      };
    }

    function debounce(fn, ms) {
      let t;
      return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    }

    const throttledRenderStudents = throttle(renderStudentList, 200);
    const throttledRenderParents = throttle(renderParentList, 200);
    const throttledRenderDismissals = throttle(renderDismissalsList, 200);

    // Initialize app
    window.onload = () => {
      google.script.run.withSuccessHandler(renderData).initializeData();
      
      // Set up search
      const searchInput = document.getElementById('searchInput');
      const clearButton = document.getElementById('searchClearButton');
      
      searchInput.addEventListener('input', debounce(handleSearchInput, 300));
      clearButton.addEventListener('click', clearSearch);
      
      // Set up tab navigation
      document.querySelectorAll('.tab-button').forEach(button => {
        button.addEventListener('click', () => switchTab(button.dataset.tab));
      });

      // Set up dismissal functionality
      setupDismissalForm();
      setupModalHandlers();
      startAlertChecking();
      requestNotificationPermission();
      startDismissalSync();   
      startCurrentClassSync();
    };

    // DISMISSAL FUNCTIONS

    function startDismissalSync() {
      try {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          // Initial sync
          syncDismissalsFromBackend();
          
          // Set up periodic sync every 15 seconds
          dismissalSyncInterval = setInterval(() => {
            syncDismissalsFromBackend();
          }, 15000);
        }
      } catch (error) {
        console.error('Error starting dismissal sync:', error);
      }
    }
    
function syncDismissalsFromBackend() {
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler((backendDismissals) => {
        if (backendDismissals && Array.isArray(backendDismissals)) {
          const processedDismissals = backendDismissals.map(remoteDismissal => ({
            ...remoteDismissal,
            dismissalTime: new Date(remoteDismissal.dismissalTime),
            scheduledAt: new Date(remoteDismissal.scheduledAt),
            calledAt: remoteDismissal.calledAt ? new Date(remoteDismissal.calledAt) : null,
            dismissedAt: remoteDismissal.dismissedAt ? new Date(remoteDismissal.dismissedAt) : null,
            returnedAt: remoteDismissal.returnedAt ? new Date(remoteDismissal.returnedAt) : null
          }));
          
          // Merge backend data with pending local updates
          // This prevents sync from overwriting changes that haven't been saved yet
          dismissals = processedDismissals.map(remoteDismissal => {
            // If this dismissal has a pending update, keep the local version
            if (pendingDismissalUpdates.has(remoteDismissal.id)) {
              const localVersion = dismissals.find(d => d.id === remoteDismissal.id);
              return localVersion || remoteDismissal;
            }
            return remoteDismissal;
          });
          
          if (currentTab === 'dismissals') {
            renderDismissalsList();
          }
        } else {
          // Only clear dismissals if we have no pending updates
          if (dismissals.length > 0 && pendingDismissalUpdates.size === 0) {
            dismissals = [];
            if (currentTab === 'dismissals') {
              renderDismissalsList();
            }
          }
        }
      })
      .withFailureHandler((error) => {
        console.error('Sync failed:', error);
      })
      .getDismissals();
  }
}

    function setupDismissalForm() {
      const scheduleButton = document.getElementById('scheduleDismissalButton');
      const clearButton = document.getElementById('clearFormButton');

      scheduleButton.addEventListener('click', scheduleDismissal);
      clearButton.addEventListener('click', clearDismissalForm);

      setupSearchableDropdown();

      // Set default time to 30 minutes from now
      const defaultTime = new Date();
      defaultTime.setMinutes(defaultTime.getMinutes() + 30);
      const timeInput = document.getElementById('dismissalTime');
      if (timeInput) {
        // Create a new date with timezone offset applied
const offset = defaultTime.getTimezoneOffset() * 60000;
const localTime = new Date(defaultTime.getTime() - offset);
timeInput.value = localTime.toISOString().slice(0, 16);
      }
    }

    function setupSearchableDropdown() {
      const searchInput = document.getElementById('dismissalStudent');
      const dropdownList = document.getElementById('studentDropdownList');
      const hiddenInput = document.getElementById('dismissalStudentId');
      
      if (!searchInput || !dropdownList || !hiddenInput) return;

      let highlightedIndex = -1;
      let filteredStudents = [];

      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        highlightedIndex = -1;
        
        if (query === '') {
          filteredStudents = [...students];
          hiddenInput.value = '';
        } else {
          filteredStudents = students.filter(student => 
            student.fullName.toLowerCase().includes(query) ||
            student.grade.toLowerCase().includes(query) ||
            student.id.toLowerCase().includes(query)
          );
        }
        
        renderDropdownList(filteredStudents, highlightedIndex);
        showDropdown();
      });

      searchInput.addEventListener('focus', () => {
        filteredStudents = [...students];
        renderDropdownList(filteredStudents, highlightedIndex);
        showDropdown();
      });

      searchInput.addEventListener('blur', (e) => {
        setTimeout(() => hideDropdown(), 150);
      });

      searchInput.addEventListener('keydown', (e) => {
        if (!dropdownList.classList.contains('show')) return;

        switch (e.key) {
          case 'ArrowDown':
            e.preventDefault();
            highlightedIndex = Math.min(highlightedIndex + 1, filteredStudents.length - 1);
            renderDropdownList(filteredStudents, highlightedIndex);
            break;
          case 'ArrowUp':
            e.preventDefault();
            highlightedIndex = Math.max(highlightedIndex - 1, -1);
            renderDropdownList(filteredStudents, highlightedIndex);
            break;
          case 'Enter':
            e.preventDefault();
            if (highlightedIndex >= 0 && filteredStudents[highlightedIndex]) {
              selectStudent(filteredStudents[highlightedIndex]);
            }
            break;
          case 'Escape':
            hideDropdown();
            searchInput.blur();
            break;
        }
      });

      function showDropdown() {
        dropdownList.classList.add('show');
      }

      function hideDropdown() {
        dropdownList.classList.remove('show');
      }

      function renderDropdownList(students, highlightIndex) {
        dropdownList.innerHTML = '';
        
        if (students.length === 0) {
          const emptyDiv = document.createElement('div');
          emptyDiv.className = 'dropdown-empty';
          emptyDiv.textContent = 'No students found';
          dropdownList.appendChild(emptyDiv);
          return;
        }

        students.forEach((student, index) => {
          const item = document.createElement('div');
          item.className = 'dropdown-item';
          if (index === highlightIndex) {
            item.classList.add('highlighted');
          }
          
          item.innerHTML = `
            <span class="student-name">${student.fullName}</span>
            <span class="student-grade">${student.grade}</span>
          `;
          
          item.addEventListener('mousedown', (e) => {
            e.preventDefault();
            selectStudent(student);
          });
          
          item.addEventListener('mouseenter', () => {
            dropdownList.querySelectorAll('.dropdown-item').forEach(item => {
              item.classList.remove('highlighted');
            });
            item.classList.add('highlighted');
            highlightedIndex = index;
          });
          
          dropdownList.appendChild(item);
        });
      }

      function selectStudent(student) {
        searchInput.value = `${student.fullName} (${student.grade})`;
        hiddenInput.value = student.id;
        hideDropdown();
      }
    }

    function calculateMissedClass(grade, dismissalTime) {
      const gradeLower = grade.toLowerCase();
      const scheduleBlocks = scheduleMap.get(gradeLower) || [];
      
      const dismissalTimeOnly = dismissalTime.getHours() * 60 + dismissalTime.getMinutes();
      
      for (let block of scheduleBlocks) {
        const startTime = new Date(block.start);
        const endTime = new Date(block.stop);
        const startMinutes = startTime.getHours() * 60 + startTime.getMinutes();
        const endMinutes = endTime.getHours() * 60 + endTime.getMinutes();
        
        if (dismissalTimeOnly >= startMinutes && dismissalTimeOnly <= endMinutes) {
          return `${block.subject} (${block.teacher}) - Room ${block.room}`;
        }
      }
      
      return 'Between classes';
    }

    function clearDismissalForm() {
      const studentInput = document.getElementById('dismissalStudent');
      const studentIdInput = document.getElementById('dismissalStudentId');
      const timeInput = document.getElementById('dismissalTime');
      const dropdownList = document.getElementById('studentDropdownList');
      
      if (studentInput) studentInput.value = '';
      if (studentIdInput) studentIdInput.value = '';
      if (dropdownList) dropdownList.classList.remove('show');
      
      if (timeInput) {
        const defaultTime = new Date();
        defaultTime.setMinutes(defaultTime.getMinutes() + 30);
        // Create a new date with timezone offset applied
const offset = defaultTime.getTimezoneOffset() * 60000;
const localTime = new Date(defaultTime.getTime() - offset);
timeInput.value = localTime.toISOString().slice(0, 16);
      }
    }

    function scheduleDismissal() {
      const studentInput = document.getElementById('dismissalStudent');
      const studentIdInput = document.getElementById('dismissalStudentId');
      const timeInput = document.getElementById('dismissalTime');
      
      const studentId = studentIdInput.value;
      const dismissalTime = timeInput.value;

      if (!studentId || !dismissalTime) {
        alert('Please fill in all required fields');
        return;
      }

      const student = students.find(s => s.id === studentId);
      if (!student) {
        alert('Error: Student not found');
        return;
      }
      
      const dismissalDateTime = new Date(dismissalTime);
      const missedClass = calculateMissedClass(student.grade, dismissalDateTime);
      const currentClass = getCurrentClass(student.grade);

const dismissal = {
  id: `dismissal_${Date.now()}`,
  studentId: studentId,
  studentName: student.fullName,
  grade: student.grade,
  bus: student.bus || null,        // ✅ ADD THIS LINE
  club: student.club || null,      // ✅ ADD THIS LINE
  dismissalTime: dismissalDateTime,
  status: DISMISSAL_STATUS.SCHEDULED,
  scheduledAt: new Date(),
  missedClass: missedClass,
  currentClass: currentClass
};

      dismissals.push(dismissal);
      clearDismissalForm();
      renderDismissalsList();
      
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        showAlert('Saving dismissal...');

    function startAlertChecking() {
      alertCheckInterval = setInterval(checkForAlerts, 30000);

    function checkForAlerts() {
      const now = new Date();
      const alertGroups = new Map();
      
      // Group dismissals by alert type and time
      dismissals.forEach(dismissal => {
        if (dismissal.status === DISMISSAL_STATUS.SCHEDULED) {
          const timeDiff = dismissal.dismissalTime - now;
          const minutesUntilDismissal = Math.floor(timeDiff / (1000 * 60));
          
          if (minutesUntilDismissal <= 5 && minutesUntilDismissal > 0) {
            const key = `calldown_${formatTime(dismissal.dismissalTime)}`;
            if (!alertGroups.has(key)) {
              alertGroups.set(key, { type: 'calldown', dismissals: [], minutesUntil: minutesUntilDismissal });
            }
            alertGroups.get(key).dismissals.push(dismissal);
          }
          
          if (minutesUntilDismissal <= 0) {
            const key = `urgent_${formatTime(dismissal.dismissalTime)}`;
            if (!alertGroups.has(key)) {
              alertGroups.set(key, { type: 'urgent', dismissals: [] });
            }
            alertGroups.get(key).dismissals.push(dismissal);
          }
        }
      });
      
      // Trigger alerts for each group
      alertGroups.forEach(group => {
        if (group.type === 'calldown') {
          triggerCallDownAlert(group.dismissals, group.minutesUntil);
        } else if (group.type === 'urgent') {
          triggerUrgentAlert(group.dismissals);
        }
      });
    }

    function triggerCallDownAlert(dismissals, minutesUntil) {
      const studentNames = dismissals.map(d => d.studentName).join(', ');
      const time = formatTime(dismissals[0].dismissalTime);
      const isMultiple = dismissals.length > 1;
      
      const message = isMultiple 
        ? `Call down ${dismissals.length} students - dismissals in ${minutesUntil} minutes at ${time}`
        : `Call down ${studentNames} - dismissal in ${minutesUntil} minutes`;
      
      const title = isMultiple
        ? `Time to call down ${dismissals.length} students!`
        : `Time to call down ${studentNames}!`;
        
      showAlert(message);
      showModalAlert(dismissals, title);
      showSystemNotification(message);
      renderDismissalsList();
    }

    function triggerUrgentAlert(dismissals) {
      const studentNames = dismissals.map(d => d.studentName).join(', ');

      const message = isMultiple

      showAlert(message);

      showSystemNotification(message);
      renderDismissalsList();

    function isCallDownUrgent(dismissal) {
      if (dismissal.status !== DISMISSAL_STATUS.SCHEDULED) return false;
      
      const now = new Date();
      const timeDiff = dismissal.dismissalTime - now;
      const minutesUntilDismissal = Math.floor(timeDiff / (1000 * 60));

window.markAsCalled = function(dismissalId) {
  const dismissal = dismissals.find(d => d.id === dismissalId);
  if (dismissal) {
    // Step 1: Add to pending updates BEFORE making any changes
    // This tells the sync function to ignore this dismissal until save completes
    pendingDismissalUpdates.add(dismissalId);
    
    // Step 2: Update local data immediately for instant UI feedback
    dismissal.status = DISMISSAL_STATUS.CALLED;
    dismissal.calledAt = new Date();
    
    // Step 3: Update UI right away (no waiting for backend)
    renderDismissalsList();
    showAlert(`${dismissal.studentName} marked as called`);
    
    // Step 4: Save to backend in the background
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(() => {
          // Step 5: Remove from pending after successful save
          // Now sync can overwrite this dismissal again
          pendingDismissalUpdates.delete(dismissalId);
        })
        .withFailureHandler(() => {
          // Also remove on failure so it doesn't get stuck
          pendingDismissalUpdates.delete(dismissalId);
        })
        .updateDismissalStatus(dismissalId, DISMISSAL_STATUS.CALLED, { 
          calledAt: dismissal.calledAt.toISOString() 
        });
    }
  }
};

    // New function to mark multiple dismissals as called at once
window.markMultipleAsCalled = function(dismissalIdsString) {
  const dismissalIds = dismissalIdsString.split(',');
  let markedCount = 0;
  let studentNames = [];
  
  dismissalIds.forEach(dismissalId => {
    const dismissal = dismissals.find(d => d.id === dismissalId);
    if (dismissal && dismissal.status === DISMISSAL_STATUS.SCHEDULED) {
      // Step 1: Mark as pending to prevent sync overwrites
      pendingDismissalUpdates.add(dismissalId);
      
      // Step 2: Update local data immediately
      dismissal.status = DISMISSAL_STATUS.CALLED;
      dismissal.calledAt = new Date();
      studentNames.push(dismissal.studentName);
      markedCount++;
      
      // Step 3: Save each one to backend
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(() => {
            // Step 4: Remove from pending after save
            pendingDismissalUpdates.delete(dismissalId);
          })
          .withFailureHandler(() => {
            pendingDismissalUpdates.delete(dismissalId);
          })
          .updateDismissalStatus(dismissalId, DISMISSAL_STATUS.CALLED, { 
            calledAt: dismissal.calledAt.toISOString() 
          });
      }
    }
  });
  
  // Update UI once for all changes
  if (markedCount > 0) {

    const message = markedCount === 1

        );
      })
    );

      return searchTerms.some(term => {
        // Search by primary contact name

        // Search by secondary contact name
        if (parent.secondaryContact.name && parent.secondaryContact.name.toLowerCase().includes(term)) return true;
        
        // Search by student names
        if (parent.students && parent.students.length > 0) {
          const studentNamesWithHomeroom = parent.students.map(student => {
            const homeroom = student.homeroom || student.homeroomSection || 'Unknown';
            return `${student.fullName || student.name} (${homeroom})`;

          if (studentNamesWithHomeroom.includes(term)) return true;

        // Search by phone numbers
        if (parent.primaryContact.phone && parent.primaryContact.phone.includes(term)) return true;
        if (parent.secondaryContact.phone && parent.secondaryContact.phone.includes(term)) return true;
        
        // Search by email addresses
        if (parent.primaryContact.email && parent.primaryContact.email.toLowerCase().includes(term)) return true;
        if (parent.secondaryContact.email && parent.secondaryContact.email.toLowerCase().includes(term)) return true;
        
        // Search by relationship
        if (parent.primaryContact.relationship && parent.primaryContact.relationship.toLowerCase().includes(term)) return true;

        // Search by parent ID
        if (parent.id && String(parent.id).toLowerCase().includes(term)) return true;
        
        // Search by student IDs
        if (parent.students && parent.students.length > 0) {
          for (let student of parent.students) {

      if (dismissalSyncInterval) {
        clearInterval(dismissalSyncInterval);
      }
    });

function formatDateTime(date) {
  const dismissalDate = new Date(date);
  const today = new Date();
  const tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate() + 1);
  
  const isToday = dismissalDate.toDateString() === today.toDateString();
  const isTomorrow = dismissalDate.toDateString() === tomorrow.toDateString();
  
  const timeStr = dismissalDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  
  if (isToday) {
    return `Today ${timeStr}`;
  } else if (isTomorrow) {
    return `Tomorrow ${timeStr}`;
  } else {
    const dateStr = dismissalDate.toLocaleDateString([], {
      weekday: 'short',
      month: 'short', 
      day: 'numeric'
    });
    return `${dateStr} ${timeStr}`;
  }
}

// Add this function to detect if search query is a grade

  const trimmedQuery = query.trim().toLowerCase();
  
  // Check if query matches any grade in the schedule map
  return scheduleMap.has(trimmedQuery);
}

// Helper function to calculate class duration
function calculateDuration(start, stop) {
  const startTime = new Date(start);
  const stopTime = new Date(stop);
  const diffMs = stopTime - startTime;
  const diffMins = Math.round(diffMs / (1000 * 60));
  
  if (diffMins >= 60) {
    const hours = Math.floor(diffMins / 60);
    const mins = diffMins % 60;
    return mins > 0 ? `${hours}h ${mins}m` : `${hours}h`;
  }
  return `${diffMins}m`;
}



function getCurrentClass(studentGrade) {
  const now = new Date();
  const currentTimeMinutes = now.getHours() * 60 + now.getMinutes();
  
  const gradeLower = String(studentGrade).toLowerCase();
  const scheduleBlocks = scheduleMap.get(gradeLower) || [];
  
  // Find the current class block
  for (let block of scheduleBlocks) {
    const startTime = new Date(block.start);
    const endTime = new Date(block.stop);
    const startMinutes = startTime.getHours() * 60 + startTime.getMinutes();
    const endMinutes = endTime.getHours() * 60 + endTime.getMinutes();
    
    // Check if current time falls within this class period
    if (currentTimeMinutes >= startMinutes && currentTimeMinutes <= endMinutes) {
      return {
        subject: block.subject,
        room: block.room || null
      };
    }
  }
  
  // If no current class, find the next class
  const upcomingBlocks = scheduleBlocks.filter(block => {
    const startTime = new Date(block.start);
    const startMinutes = startTime.getHours() * 60 + startTime.getMinutes();
    return startMinutes > currentTimeMinutes;
  }).sort((a, b) => {
    const aStart = new Date(a.start).getHours() * 60 + new Date(a.start).getMinutes();
    const bStart = new Date(b.start).getHours() * 60 + new Date(b.start).getMinutes();
    return aStart - bStart;
  });
  
  if (upcomingBlocks.length > 0) {
    const nextClass = upcomingBlocks[0];
    const nextStart = new Date(nextClass.start);
    const timeUntil = formatTime(nextStart);
    return {
      subject: `Next: ${nextClass.subject} (${timeUntil})`,
      room: nextClass.room || null
    };
  }
  
  return {
    subject: 'No class scheduled',
    room: null
  };
}
